<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>uiref</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      color: #d4d4dc;
      background: #111118;
      padding: 14px 16px;
    }
    .logo {
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.3px;
      margin-bottom: 3px;
    }
    .tagline {
      color: #7a7a8e;
      font-size: 11px;
      margin-bottom: 14px;
    }
    .btn {
      width: 100%;
      background: #6c7bf0;
      color: #fff;
      border: none;
      padding: 9px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
      transition: background 0.1s;
    }
    .btn:hover { background: #7c8af5; }
    .btn-secondary {
      background: #22222e;
      color: #d4d4dc;
      border: 1px solid #2e2e3e;
    }
    .btn-secondary:hover { background: #2a2a3a; }
    .btn-workflow {
      background: #22222e;
      color: #a78bfa;
      border: 1px solid #3a3a5e;
    }
    .btn-workflow:hover { background: #2a2a3e; border-color: #6c7bf0; }
    .btn-row {
      display: flex;
      gap: 6px;
    }
    .btn-row .btn { flex: 1; margin-bottom: 0; }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 12px;
    }
    .row-label { color: #7a7a8e; }
    .row-value { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; }
    .row-value.ok { color: #34d399; }
    .row-value.warn { color: #fbbf24; }
    .divider {
      height: 1px;
      background: #2e2e3e;
      margin: 10px 0;
    }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #7a7a8e;
      margin: 6px 0 8px;
    }
    .status-card {
      background: #1a1a24;
      border: 1px solid #2e2e3e;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .status-card.active { border-color: #6c7bf0; }
    .status-card.paused { border-color: #a78bfa; }
    .status-card-title {
      font-weight: 600;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .status-card-title.active { color: #a5b3ff; }
    .status-card-title.paused { color: #c4b5fd; }
    .status-card-detail {
      font-size: 11px;
      color: #7a7a8e;
      line-height: 1.4;
    }
    .shortcut {
      background: #22222e;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'SF Mono', monospace;
      font-size: 10px;
      color: #d4d4dc;
    }
    .hint {
      color: #7a7a8e;
      font-size: 11px;
      line-height: 1.5;
      margin-top: 10px;
    }
    a { color: #a78bfa; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="logo">uiref</div>
  <div class="tagline">point at UI, send to Claude</div>

  <!-- Rendered dynamically based on workflow state -->
  <div id="controls"></div>

  <div class="divider"></div>

  <div class="row">
    <span class="row-label">Shortcut</span>
    <span class="shortcut" id="shortcut">⌘⇧C</span>
  </div>
  <div class="row">
    <span class="row-label">Inbox</span>
    <span class="row-value" id="inbox-status">not set</span>
  </div>

  <div class="hint">
    <a href="https://github.com/KokXinTan/uiref" target="_blank">Docs & Claude Skill →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
